<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deportes - Juan Diego Sagasti</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif; background: #0a0a0a; color: #ffffff; }
        header { background: linear-gradient(135deg, #1a1410 0%, #2a2015 100%); border-bottom: 2px solid #d4af37; padding: 1.2rem 2rem; }
        .header-content { max-width: 1400px; margin: 0 auto; }
        .back-link { color: #d4af37; text-decoration: none; font-size: 14px; font-weight: 600; }
        .back-link:hover { color: #f0d890; }
        main { max-width: 1200px; margin: 0 auto; padding: 4rem 2rem; }
        .section-title { font-size: 32px; font-weight: 700; margin-bottom: 2.5rem; padding-bottom: 1.2rem; border-bottom: 2px solid #d4af37; background: linear-gradient(135deg, #f0d890 0%, #d4af37 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 2rem; }
        .card { background: linear-gradient(135deg, #1a1410 0%, #2a2015 100%); border: 2px solid #d4af37; border-radius: 8px; padding: 1.5rem; position: relative; transition: all 0.3s ease; }
        .card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: linear-gradient(90deg, #d4af37, #f0d890); }
        .card:hover { border-color: #f0d890; box-shadow: 0 12px 40px rgba(212, 175, 55, 0.3); transform: translateY(-5px); }
        .card-title { font-size: 18px; font-weight: 600; margin-bottom: 0.6rem; color: #d4af37; }
        .card-meta { font-size: 12px; color: #b8960a; margin-bottom: 1rem; font-weight: 500; }
        .card-description { font-size: 14px; color: #ccc; line-height: 1.7; margin-bottom: 1rem; }
        .card-link { display: inline-block; background: linear-gradient(135deg, #d4af37 0%, #b8960a 100%); padding: 0.5rem 1rem; border-radius: 4px; font-size: 12px; font-weight: 600; color: #1a1410; text-decoration: none; margin-top: 0.5rem; margin-right: 0.5rem; }
        .card-link:hover { background: linear-gradient(135deg, #f0d890 0%, #d4af37 100%); }
        .loading { text-align: center; padding: 2rem; color: #d4af37; }
        .placeholder { background: linear-gradient(135deg, #1a1410 0%, #2a2015 100%); border: 2px dashed #d4af37; padding: 2.5rem; border-radius: 8px; text-align: center; color: #b8960a; }
        footer { background: linear-gradient(135deg, #1a1410 0%, #2a2015 100%); border-top: 2px solid #d4af37; padding: 3rem 2rem; text-align: center; font-size: 13px; color: #bbb; margin-top: 4rem; }
    </style>
</head>
<body>

<header>
    <div class="header-content">
        <a href="index.html" class="back-link">← Volver</a>
    </div>
</header>

<main>
    <h1 class="section-title">DEPORTES</h1>
    <div id="content" class="loading">Cargando contenido...</div>
</main>

<footer>
    <p>Juan Diego Sagasti © 2024</p>
</footer>

<script>
const SHEET_ID = '1rky7rvDDyipJCSNHLsLNsw8RCNQLgz_VoFfSwE1uvns';
const API_KEY = 'AIzaSyDx3U-WVY1a5DzxfIKCzvJOlcj1YNahQ_o';

async function loadData() {
    try {
        const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/DEPORTES?key=${API_KEY}`;
        const response = await fetch(url);
        const data = await response.json();
        
        if (data.values && data.values.length > 1) {
            renderCards(data.values.slice(1).filter(row => row[0]));
        } else {
            document.getElementById('content').innerHTML = '<div class="placeholder">Sin contenido</div>';
        }
    } catch (error) {
        console.error('Error:', error);
        document.getElementById('content').innerHTML = '<div class="placeholder" style="color: #ff6b6b;">Error al cargar</div>';
    }
}

function renderCards(rows) {
    const html = '<div class="grid">' + rows.map(row => {
        const deporte = row[0] || '';
        const titulo = row[1] || '';
        const nivel = row[2] || '';
        const desc = row[3] || '';
        const link = row[4] || '';
        
        return `
            <div class="card">
                <div class="card-title">${deporte}</div>
                ${titulo ? `<div class="card-meta">${titulo}</div>` : ''}
                ${nivel ? `<div class="card-meta">Nivel: ${nivel}</div>` : ''}
                ${desc ? `<p class="card-description">${desc}</p>` : ''}
                ${link ? `<a href="${link}" target="_blank" class="card-link">Más info</a>` : ''}
            </div>
        `;
    }).join('') + '</div>';
    
    document.getElementById('content').innerHTML = html;
}

loadData();
</script>

</body>
</html>
