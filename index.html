<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juan Diego Sagasti - Actor, Modelo, Deportista</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Sora:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        
        :root {
            --primary: #d4af37;
            --primary-light: #f0d890;
            --primary-dark: #b8960a;
            --bg-dark: #0a0a0a;
            --bg-card: #1a1410;
            --bg-card-light: #2a2015;
            --text-primary: #ffffff;
            --text-secondary: #b8b8b8;
            --accent: #d4af37;
        }
        
        body { 
            font-family: 'Sora', sans-serif; 
            background: var(--bg-dark); 
            color: var(--text-primary);
            line-height: 1.6;
        }
        
        header { 
            position: sticky; 
            top: 0; 
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            z-index: 1000; 
            padding: 1.5rem 2rem;
            transition: all 0.3s ease;
        }
        
        .header-content { 
            max-width: 1400px; 
            margin: 0 auto; 
            display: flex; 
            justify-content: center; 
        }
        
        nav { 
            display: flex; 
            gap: 3rem; 
            flex-wrap: wrap; 
            justify-content: center;
            align-items: center;
        }
        
        nav a { 
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary); 
            cursor: pointer; 
            padding: 0.5rem 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            position: relative;
        }
        
        nav a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--primary), var(--primary-light));
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        nav a:hover {
            color: var(--primary-light);
            transform: translateY(-1px);
        }
        
        nav a:hover::after {
            width: 100%;
        }
        
        .hero { 
            background: linear-gradient(135deg, rgba(26, 20, 16, 0.8) 0%, rgba(42, 32, 21, 0.6) 100%);
            backdrop-filter: blur(5px);
            padding: 5rem 2rem 3rem;
            border-bottom: 1px solid rgba(212, 175, 55, 0.15);
        }
        
        .hero-content { 
            max-width: 1400px; 
            margin: 0 auto; 
        }
        
        .hero-title { 
            text-align: center; 
            margin-bottom: 2rem; 
        }
        
        .hero-title h1 { 
            font-family: 'Playfair Display', serif;
            font-size: 64px; 
            font-weight: 700; 
            margin-bottom: 1rem;
            letter-spacing: -1px;
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary) 50%, var(--primary-dark) 100%); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            background-clip: text;
            animation: fadeInDown 0.8s ease-out;
        }
        
        .hero-tagline { 
            font-size: 16px; 
            color: var(--text-secondary);
            margin-bottom: 2.5rem; 
            font-weight: 400;
            letter-spacing: 1px;
            text-transform: uppercase;
            animation: fadeInUp 0.8s ease-out 0.1s both;
        }
        
        .hero-images { 
            display: block; 
            margin-bottom: 3rem;
            animation: fadeIn 0.8s ease-out 0.2s both;
        }
        
        .hero-image img { 
            width: 100%; 
            border-radius: 4px;
            box-shadow: 0 30px 80px rgba(212, 175, 55, 0.15);
            border: 1px solid rgba(212, 175, 55, 0.2);
            object-fit: cover; 
            aspect-ratio: 16/9;
            transition: all 0.5s ease;
        }
        
        .hero-image img:hover {
            box-shadow: 0 40px 100px rgba(212, 175, 55, 0.25);
            border-color: rgba(212, 175, 55, 0.4);
        }
        
        .hero-video { 
            margin-bottom: 3rem;
            animation: fadeIn 0.8s ease-out 0.3s both;
        }
        
        .video-container { 
            position: relative; 
            width: 100%; 
            padding-bottom: 56.25%; 
            height: 0; 
            overflow: hidden; 
            border-radius: 4px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 30px 80px rgba(212, 175, 55, 0.15);
        }
        
        .video-container iframe { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            border: none; 
        }
        
        .hero-meta { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 2rem;
            padding: 2.5rem;
            background: linear-gradient(135deg, rgba(26, 20, 16, 0.5) 0%, rgba(42, 32, 21, 0.3) 100%);
            border-radius: 4px;
            border: 1px solid rgba(212, 175, 55, 0.15);
            backdrop-filter: blur(10px);
            animation: fadeInUp 0.8s ease-out 0.4s both;
        }
        
        .meta-item { 
            display: flex; 
            flex-direction: column; 
            gap: 0.6rem; 
        }
        
        .meta-label { 
            font-size: 10px; 
            color: var(--primary-dark);
            text-transform: uppercase; 
            letter-spacing: 1px; 
            font-weight: 600;
            opacity: 0.8;
        }
        
        .meta-value { 
            font-size: 15px; 
            color: var(--text-primary);
            font-weight: 500;
            line-height: 1.4;
        }
        
        main { 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 5rem 2rem; 
        }
        
        .loading { 
            text-align: center; 
            padding: 3rem; 
            color: var(--primary);
            font-size: 14px;
            letter-spacing: 1px;
        }
        
        footer { 
            background: rgba(26, 20, 16, 0.8);
            border-top: 1px solid rgba(212, 175, 55, 0.15);
            padding: 3rem 2rem; 
            text-align: center; 
            font-size: 12px; 
            color: var(--text-secondary);
            letter-spacing: 0.5px;
        }
        
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .action-buttons {
            display: flex;
            gap: 1.2rem;
            justify-content: center;
            margin-top: 3rem;
            margin-bottom: 4rem;
            flex-wrap: wrap;
            animation: fadeInUp 0.8s ease-out 0.5s both;
        }
        
        .btn {
            padding: 1.1rem 2.2rem;
            border: 2px solid var(--primary);
            background: transparent;
            color: var(--primary);
            text-decoration: none;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.8rem;
            position: relative;
            overflow: hidden;
        }
        
        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--primary-light));
            transition: left 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: -1;
        }
        
        .btn:hover::before {
            left: 0;
        }
        
        .btn:hover {
            color: #0a0a0a;
            border-color: var(--primary-light);
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(212, 175, 55, 0.3);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary) 100%);
            border-color: var(--primary);
            color: #0a0a0a;
        }
        
        .btn-primary:hover {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: #ffffff;
        }
        
        .ficha-tecnica {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
            padding: 3rem;
            background: linear-gradient(135deg, rgba(26, 20, 16, 0.6) 0%, rgba(42, 32, 21, 0.4) 100%);
            border-radius: 4px;
            border: 1px solid rgba(212, 175, 55, 0.15);
            margin-top: 3rem;
            animation: fadeInUp 0.8s ease-out 0.45s both;
        }
        
        .ficha-item {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }
        
        .ficha-label {
            font-size: 11px;
            color: var(--primary-dark);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            font-weight: 700;
            opacity: 0.9;
        }
        
        .ficha-value {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.6;
            font-weight: 500;
        }
        
        @media (max-width: 1024px) { 
            .hero-meta { grid-template-columns: repeat(2, 1fr); } 
        }
        
        @media (max-width: 768px) {
            .hero-title h1 { font-size: 42px; }
            nav { gap: 1.5rem; }
            .hero-meta { grid-template-columns: 1fr; }
            header { padding: 1rem 2rem; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-content">
        <nav id="nav-menu"></nav>
    </div>
</header>

<section class="hero">
    <div class="hero-content">
        <div class="hero-title">
            <h1 id="hero-name">Cargando...</h1>
            <p class="hero-tagline" id="hero-tagline"></p>
        </div>
        <div class="hero-images">
            <div class="hero-image">
                <img id="hero-image-1" src="" alt="Foto" style="display:none;">
            </div>
        </div>
        <div class="hero-video" id="hero-video-container"></div>
        <div class="action-buttons" id="action-buttons"></div>
        <div class="hero-meta" id="hero-meta"></div>
        <div class="ficha-tecnica" id="ficha-tecnica"></div>
    </div>
</section>

<main id="main-content">
    <div class="loading">Cargando contenido...</div>
</main>

<footer>
    <p>Juan Diego Sagasti © 2024 • Todos los derechos reservados</p>
</footer>

<script>
const SHEET_ID = '1rky7rvDDyipJCSNHLsLNsw8RCNQLgz_VoFfSwE1uvns';
const API_KEY = 'AIzaSyBgViH14YRp3uE1Tj7kGg9lq3U-NzF-om0';

const SECTIONS = [
    { name: 'FOTOS', file: '1-fotos.html' },
    { name: 'AUDIOVISUAL', file: '2-audiovisual.html' },
    { name: 'TEATRO', file: '3-teatro.html' },
    { name: 'TV', file: '4-tv.html' },
    { name: 'CRÍTICAS', file: '5-criticas.html' },
    { name: 'DEPORTES', file: '6-deportes.html' },
    { name: 'CONTACTO', file: '7-contacto.html' }
];

async function loadData() {
    try {
        const configUrl = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/PRESENTACIÓN?key=${API_KEY}`;
        const configResponse = await fetch(configUrl);
        const configData = await configResponse.json();
        renderHero(configData.values || []);
        renderNavigation();
    } catch (error) {
        console.error('Error:', error);
    }
}

function renderHero(rows) {
    const config = {};
    
    if (rows && rows.length > 0) {
        rows.slice(1).forEach(row => {
            if (row && row.length >= 2) {
                const key = (row[0] || '').trim();
                const value = (row[1] || '').trim();
                if (key) config[key] = value;
            }
        });
    }
    
    const nombre = config['Nombre'] || 'Juan Diego Sagasti';
    document.getElementById('hero-name').textContent = nombre;
    
    const tagline = config['Tagline'] || 'Actor • Emprendedor • Deportista';
    document.getElementById('hero-tagline').textContent = tagline;
    
    if (config['Foto 1'] && config['Foto 1'].length > 0) {
        const img1 = document.getElementById('hero-image-1');
        const fotoUrl = convertLink(config['Foto 1']);
        if (fotoUrl) {
            img1.src = fotoUrl;
            img1.style.display = 'block';
            img1.onerror = function() { this.style.display = 'none'; };
        }
    }
    
    if (config['YouTube'] && config['YouTube'].length > 0) {
        const videoId = extractYouTubeId(config['YouTube']);
        if (videoId) {
            const videoContainer = document.getElementById('hero-video-container');
            videoContainer.innerHTML = `<div class="video-container"><iframe src="https://www.youtube.com/embed/${videoId}" allowfullscreen="" loading="lazy"></iframe></div>`;
        }
    }
    
    const metaItems = [];
    if (config['Nacimiento']) metaItems.push(`<div class="meta-item"><div class="meta-label">Nacimiento</div><div class="meta-value">${config['Nacimiento']}</div></div>`);
    if (config['Altura']) metaItems.push(`<div class="meta-item"><div class="meta-label">Altura</div><div class="meta-value">${config['Altura']}</div></div>`);
    if (config['Idiomas']) metaItems.push(`<div class="meta-item"><div class="meta-label">Idiomas</div><div class="meta-value">${config['Idiomas']}</div></div>`);
    if (config['Base']) metaItems.push(`<div class="meta-item"><div class="meta-label">Base</div><div class="meta-value">${config['Base']}</div></div>`);
    
    document.getElementById('hero-meta').innerHTML = metaItems.join('') || '<div></div>';
    
    // Botones de acción
    renderActionButtons(config);
    
    // Ficha técnica
    renderFichaTecnica(config);
}

function renderNavigation() {
    const nav = document.getElementById('nav-menu');
    SECTIONS.forEach(section => {
        const link = document.createElement('a');
        link.href = section.file;
        link.textContent = section.name;
        nav.appendChild(link);
    });
}

function convertLink(link) {
    if (!link) return '';
    const match = link.match(/\/d\/(.*?)\//);
    return match ? `https://drive.google.com/uc?export=view&id=${match[1]}` : link;
}

function extractYouTubeId(url) {
    const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
    const match = url.match(regExp);
    return (match && match[2].length == 11) ? match[2] : null;
}

function renderActionButtons(config) {
    const buttonsContainer = document.getElementById('action-buttons');
    let buttonsHtml = '';
    
    // Botón CV
    if (config['CV']) {
        buttonsHtml += `<a href="${config['CV']}" target="_blank" class="btn btn-primary">📥 Descargar CV</a>`;
    }
    
    // Botón Mail
    if (config['Mail']) {
        buttonsHtml += `<a href="mailto:${config['Mail']}" class="btn">✉️ Enviar Mail</a>`;
    }
    
    // Botón WhatsApp
    if (config['Teléfono']) {
        const phoneNumber = config['Teléfono'].replace(/\s/g, '').replace('+', '');
        buttonsHtml += `<a href="https://wa.me/${phoneNumber}" target="_blank" class="btn">💬 WhatsApp</a>`;
    }
    
    if (buttonsHtml) {
        buttonsContainer.innerHTML = buttonsHtml;
    }
}

function renderFichaTecnica(config) {
    const fichaTecnicaContainer = document.getElementById('ficha-tecnica');
    let fichaTecnicaHtml = '';
    
    if (config['Habilidades']) {
        fichaTecnicaHtml += `<div class="ficha-item"><div class="ficha-label">Habilidades</div><div class="ficha-value">${config['Habilidades']}</div></div>`;
    }
    
    if (config['Deportes']) {
        fichaTecnicaHtml += `<div class="ficha-item"><div class="ficha-label">Deportes</div><div class="ficha-value">${config['Deportes']}</div></div>`;
    }
    
    if (fichaTecnicaHtml) {
        fichaTecnicaContainer.innerHTML = fichaTecnicaHtml;
    }
}

loadData();
</script>

</body>
</html>
