<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juan Diego Sagasti - Actor, Modelo, Deportista</title>
    <meta name="description" content="Portfolio profesional de Juan Diego Sagasti">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: #0a0a0a;
            color: #ffffff;
        }

        header {
            position: sticky;
            top: 0;
            background: linear-gradient(135deg, #1a1410 0%, #2a2015 100%);
            border-bottom: 2px solid #d4af37;
            z-index: 1000;
            padding: 1.2rem 2rem;
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.1);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 3rem;
        }

        .logo { 
            font-size: 18px; 
            font-weight: 700; 
            letter-spacing: 2px; 
            color: #d4af37;
        }

        .nav-refresh {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        nav {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }

        nav button {
            background: none;
            border: none;
            font-size: 13px;
            color: #999;
            cursor: pointer;
            padding: 0.6rem 0;
            transition: all 0.3s ease;
            font-weight: 500;
            position: relative;
            white-space: nowrap;
            text-transform: capitalize;
        }

        nav button:hover { color: #d4af37; }
        nav button.active { color: #d4af37; font-weight: 600; }
        nav button.active::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, #d4af37, #f0d890);
        }

        .refresh-btn {
            background: none;
            border: 1px solid #d4af37;
            color: #d4af37;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            white-space: nowrap;
        }

        .refresh-btn:hover {
            background: #d4af37;
            color: #1a1410;
        }

        .hero {
            background: linear-gradient(135deg, #1a1410 0%, #2a2015 50%, #1f1810 100%);
            padding: 4rem 2rem;
            border-bottom: 2px solid #d4af37;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.08) 0%, transparent 70%);
            border-radius: 50%;
        }

        .hero-content {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .hero-title {
            text-align: center;
            margin-bottom: 1rem;
        }

        .hero-title h1 {
            font-size: 52px;
            font-weight: 700;
            margin-bottom: 0.8rem;
            background: linear-gradient(135deg, #f0d890 0%, #d4af37 50%, #b8960a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-tagline { 
            font-size: 18px; 
            color: #d4af37; 
            margin-bottom: 3rem; 
            font-weight: 500; 
            letter-spacing: 1px;
            text-align: center;
        }

        .hero-images {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 4rem;
        }

        .hero-image img {
            width: 100%;
            border-radius: 8px;
            box-shadow: 0 20px 60px rgba(212, 175, 55, 0.3);
            border: 2px solid #d4af37;
            transition: transform 0.3s ease;
            object-fit: cover;
            aspect-ratio: 3/4;
        }

        .hero-image img:hover { transform: scale(1.02); }

        .hero-meta {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2rem;
            background: linear-gradient(135deg, rgba(26, 20, 16, 0.8) 0%, rgba(42, 32, 21, 0.8) 100%);
            padding: 3rem;
            border-radius: 8px;
            border: 2px solid #d4af37;
            backdrop-filter: blur(10px);
        }

        .meta-item {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .meta-label { 
            font-size: 11px; 
            color: #b8960a; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            font-weight: 600; 
        }

        .meta-value { 
            font-size: 16px; 
            color: #ffffff; 
            font-weight: 500;
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }

        .section { display: none; animation: fadeIn 0.5s ease-in; }
        .section.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .section-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 2.5rem;
            padding-bottom: 1.2rem;
            border-bottom: 2px solid #d4af37;
            background: linear-gradient(135deg, #f0d890 0%, #d4af37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
            margin-bottom: 2.5rem;
        }

        .card {
            background: linear-gradient(135deg, #1a1410 0%, #2a2015 100%);
            border: 2px solid #d4af37;
            border-radius: 8px;
            padding: 1.5rem;
            position: relative;
            transition: all 0.3s ease;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, #d4af37, #f0d890);
        }

        .card:hover {
            border-color: #f0d890;
            box-shadow: 0 12px 40px rgba(212, 175, 55, 0.3);
            transform: translateY(-5px);
        }

        .card-title { font-size: 18px; font-weight: 600; margin-bottom: 0.6rem; color: #d4af37; }
        .card-meta { font-size: 12px; color: #b8960a; margin-bottom: 1rem; font-weight: 500; }
        .card-description { font-size: 14px; color: #ccc; line-height: 1.7; margin-bottom: 1rem; }

        .card-link {
            display: inline-block;
            background: linear-gradient(135deg, #d4af37 0%, #b8960a 100%);
            padding: 0.5rem 1rem;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            color: #1a1410;
            text-decoration: none;
            transition: all 0.3s ease;
            margin-top: 0.5rem;
            margin-right: 0.5rem;
        }

        .card-link:hover {
            background: linear-gradient(135deg, #f0d890 0%, #d4af37 100%);
        }

        .card-role {
            display: inline-block;
            background: linear-gradient(135deg, #d4af37 0%, #b8960a 100%);
            padding: 0.4rem 0.9rem;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            color: #1a1410;
            margin-top: 1rem;
        }

        .placeholder {
            background: linear-gradient(135deg, #1a1410 0%, #2a2015 100%);
            border: 2px dashed #d4af37;
            padding: 2.5rem;
            border-radius: 8px;
            text-align: center;
            color: #b8960a;
        }

        .placeholder-title { font-size: 18px; font-weight: 600; color: #d4af37; margin-bottom: 0.8rem; }
        .placeholder-text { font-size: 14px; color: #bbb; }

        .contact-card {
            background: linear-gradient(135deg, #1a1410 0%, #2a2015 100%);
            border: 2px solid #d4af37;
            border-radius: 8px;
            padding: 2.5rem;
            max-width: 550px;
            position: relative;
        }

        .contact-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, #d4af37, #f0d890);
        }

        .contact-item { margin-bottom: 2.2rem; }
        .contact-item:last-child { margin-bottom: 0; }
        .contact-label { font-size: 11px; color: #b8960a; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.6rem; font-weight: 600; }
        .contact-value { font-size: 16px; color: #ffffff; font-weight: 500; }
        .contact-value a { color: #d4af37; text-decoration: none; border-bottom: 2px solid #d4af37; transition: all 0.3s ease; font-weight: 600; }
        .contact-value a:hover { color: #f0d890; border-bottom-color: #f0d890; }

        .loading { text-align: center; padding: 2rem; color: #d4af37; }

        footer {
            background: linear-gradient(135deg, #1a1410 0%, #2a2015 100%);
            border-top: 2px solid #d4af37;
            padding: 3rem 2rem;
            text-align: center;
            font-size: 13px;
            color: #bbb;
            margin-top: 4rem;
        }

        footer a { color: #d4af37; text-decoration: none; border-bottom: 2px solid #d4af37; }
        footer a:hover { color: #f0d890; border-bottom-color: #f0d890; }

        @media (max-width: 1024px) {
            .hero-meta {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .hero-images { grid-template-columns: 1fr; }
            .hero-title h1 { font-size: 36px; }
            .grid { grid-template-columns: 1fr; }
            nav { gap: 1rem; }
            .hero-meta { grid-template-columns: 1fr; }
            .header-content { flex-direction: column; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-content">
        <div class="logo">JDS</div>
        <div class="nav-refresh">
            <nav id="nav-menu"></nav>
            <button class="refresh-btn" onclick="reloadData()">↻ Actualizar</button>
        </div>
    </div>
</header>

<section class="hero">
    <div class="hero-content">
        <div class="hero-title">
            <h1 id="hero-name">Cargando...</h1>
            <p class="hero-tagline" id="hero-tagline"></p>
        </div>

        <div class="hero-images">
            <div class="hero-image">
                <img id="hero-image-1" src="" alt="Juan Diego Sagasti - Foto 1" style="display:none;">
            </div>
            <div class="hero-image">
                <img id="hero-image-2" src="" alt="Juan Diego Sagasti - Foto 2" style="display:none;">
            </div>
        </div>

        <div class="hero-meta" id="hero-meta"></div>
    </div>
</section>

<main id="main-content">
    <div class="loading">Cargando contenido...</div>
</main>

<footer>
    <p>Juan Diego Sagasti © 2024 • <a href="https://juandiegosagasti.com">juandiegosagasti.com</a></p>
</footer>

<script>
const SHEET_ID = '1rky7rvDDyipJCSNHLsLNsw8RCNQLgz_VoFfSwE1uvns';
const API_KEY = 'AIzaSyBCnQX-z8Q-5K6-y9pZ0a1b2c3d4e5f6g7h';

async function loadSheetData() {
    try {
        const sheetNames = ['Config', 'PRESENTACIÓN', 'FOTOS', 'AUDIOVISUAL', 'TEATRO', 'TV', 'CRÍTICAS', 'DEPORTES', 'CONTACTO'];
        const data = {};

        for (const sheetName of sheetNames) {
            const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(sheetName)}?key=${API_KEY}`;
            
            try {
                const response = await fetch(url);
                const result = await response.json();
                
                if (result.values) {
                    data[sheetName] = parseSheetData(result.values);
                }
            } catch (e) {
                console.warn(`Error loading ${sheetName}:`, e);
                data[sheetName] = [];
            }
        }

        renderPage(data);
    } catch (error) {
        console.error('Error:', error);
        document.getElementById('main-content').innerHTML = '<div class="loading" style="color: #ff6b6b;">Error al cargar. Intenta recargar.</div>';
    }
}

function parseSheetData(rows) {
    if (!rows || rows.length === 0) return [];
    
    const headers = rows[0];
    return rows.slice(1).map(row => {
        const obj = {};
        headers.forEach((header, i) => {
            obj[header] = row[i] || '';
        });
        return obj;
    });
}

function renderPage(data) {
    renderHero(data.Config || [], data['PRESENTACIÓN'] || []);
    renderNavigation();
    renderSections(data);
}

function renderHero(configData, presentacionData) {
    const config = {};
    configData.forEach(row => {
        if (row.Key) config[row.Key] = row.Value || '';
    });
    
    document.getElementById('hero-name').textContent = config['Nombre'] || 'Juan Diego Sagasti';
    document.getElementById('hero-tagline').textContent = config['Tagline'] || 'Actor • Emprendedor • Deportista';
    
    if (presentacionData.length > 0) {
        if (presentacionData[0]['Foto 1']) {
            const foto1Url = convertGoogleDriveLink(presentacionData[0]['Foto 1']);
            document.getElementById('hero-image-1').src = foto1Url;
            document.getElementById('hero-image-1').style.display = 'block';
        }
        
        if (presentacionData[0]['Foto 2']) {
            const foto2Url = convertGoogleDriveLink(presentacionData[0]['Foto 2']);
            document.getElementById('hero-image-2').src = foto2Url;
            document.getElementById('hero-image-2').style.display = 'block';
        }
    }
    
    const metaHtml = `
        <div class="meta-item">
            <div class="meta-label">Nacimiento</div>
            <div class="meta-value">${config['Nacimiento'] || '26/08/1995'}</div>
        </div>
        <div class="meta-item">
            <div class="meta-label">Altura</div>
            <div class="meta-value">${config['Altura'] || '1.80 mts'}</div>
        </div>
        <div class="meta-item">
            <div class="meta-label">Idiomas</div>
            <div class="meta-value">${config['Idiomas'] || 'Español, Inglés (Bilingüe), Portugués'}</div>
        </div>
        <div class="meta-item">
            <div class="meta-label">Base</div>
            <div class="meta-value">${config['Base'] || 'Buenos Aires • Punta del Este'}</div>
        </div>
    `;
    document.getElementById('hero-meta').innerHTML = metaHtml;
}

function convertGoogleDriveLink(link) {
    if (!link) return '';
    const match = link.match(/\/d\/(.*?)\//);
    if (match) {
        return `https://drive.google.com/uc?export=view&id=${match[1]}`;
    }
    return link;
}

function renderNavigation() {
    const nav = document.getElementById('nav-menu');
    nav.innerHTML = '';
    const sections = ['PRESENTACIÓN', 'FOTOS', 'AUDIOVISUAL', 'TEATRO', 'TV', 'CRÍTICAS', 'DEPORTES', 'CONTACTO'];
    
    sections.forEach((section, idx) => {
        const btn = document.createElement('button');
        btn.className = 'nav-btn' + (idx === 0 ? ' active' : '');
        btn.textContent = section;
        const sectionId = sanitizeId(section);
        btn.onclick = () => showSection(sectionId);
        nav.appendChild(btn);
    });
}

function sanitizeId(text) {
    return text.toLowerCase().replace(/[áéíóúñ]/g, x => ({á:'a',é:'e',í:'i',ó:'o',ú:'u',ñ:'n'}[x]));
}

function renderSections(data) {
    const main = document.getElementById('main-content');
    let html = '';
    
    const sectionConfig = [
        { name: 'PRESENTACIÓN', id: 'presentacion' },
        { name: 'FOTOS', id: 'fotos' },
        { name: 'AUDIOVISUAL', id: 'audiovisual' },
        { name: 'TEATRO', id: 'teatro' },
        { name: 'TV', id: 'tv' },
        { name: 'CRÍTICAS', id: 'criticas' },
        { name: 'DEPORTES', id: 'deportes' },
        { name: 'CONTACTO', id: 'contacto' }
    ];
    
    sectionConfig.forEach((section, idx) => {
        const sheetData = data[section.name] || [];
        let content = '';
        
        if (section.name === 'CONTACTO') {
            content = renderContactSection(sheetData);
        } else {
            content = renderCardSection(sheetData);
        }
        
        html += `
            <div id="${section.id}" class="section ${idx === 0 ? 'active' : ''}">
                <h2 class="section-title">${section.name}</h2>
                ${content}
            </div>
        `;
    });
    
    main.innerHTML = html;
}

function renderCardSection(items) {
    if (!items || items.length === 0) {
        return '<div class="placeholder"><div class="placeholder-title">Sin contenido</div></div>';
    }
    
    return '<div class="grid">' + items.map(item => {
        let linkHtml = '';
        if (item.Link && item.Link.trim()) {
            linkHtml = `<a href="${item.Link}" target="_blank" class="card-link">Ver más</a>`;
        }
        
        const role = item.Rol || item.Deporte || item.Autor || '';
        
        return `
            <div class="card">
                <div class="card-title">${item.Titulo || ''}</div>
                <div class="card-meta">${role}</div>
                <p class="card-description">${item.Descripcion || item.Lugar || item.Nivel || item.Cita || ''}</p>
                ${linkHtml}
                ${role ? `<span class="card-role">${role}</span>` : ''}
            </div>
        `;
    }).join('') + '</div>';
}

function renderContactSection(items) {
    if (!items || items.length === 0) {
        return '<div class="placeholder"><div class="placeholder-title">Sin datos</div></div>';
    }
    
    return '<div class="contact-card">' + items.map(item => {
        let value = item.Value || '';
        if (item.Label === 'Email') {
            value = `<a href="mailto:${value}">${value}</a>`;
        } else if (item.Label === 'Instagram') {
            value = `<a href="https://instagram.com/${value.replace('@', '')}" target="_blank">${value}</a>`;
        } else if (item.Label === 'Teléfono') {
            value = `<a href="tel:${value}">${value}</a>`;
        }
        
        return `
            <div class="contact-item">
                <div class="contact-label">${item.Label || ''}</div>
                <div class="contact-value">${value}</div>
            </div>
        `;
    }).join('') + '</div>';
}

function showSection(sectionId) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    
    const section = document.getElementById(sectionId);
    if (section) {
        section.classList.add('active');
        const btn = Array.from(document.querySelectorAll('.nav-btn')).find(b => sanitizeId(b.textContent) === sectionId);
        if (btn) btn.classList.add('active');
        section.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
}

function reloadData() {
    document.getElementById('main-content').innerHTML = '<div class="loading">Actualizando...</div>';
    loadSheetData();
}

loadSheetData();
setInterval(loadSheetData, 30000);
</script>

</body>
</html>
